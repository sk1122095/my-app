services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      SQLITE_PATH: /data/portal.db
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
